services:
  - type: web
    name: agrishow-pedidos
    runtime: python
    plan: free
    buildCommand: "pip install -r requirements.txt"
    startCommand: "gunicorn app:app --bind 0.0.0.0:$PORT --workers 2 --timeout 120"
    envVars:
      - key: PYTHON_VERSION
        value: 3.11.9
      - key: SECRET_KEY
        generateValue: true
      - key: FLASK_DEBUG
        value: "0"
    disk:
      name: agrishow-data
      mountPath: /opt/render/project/src/data
      sizeGB: 1
